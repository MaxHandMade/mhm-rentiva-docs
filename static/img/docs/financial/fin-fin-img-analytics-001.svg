<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .t{font:700 24px Arial;fill:#111827}.s{font:500 15px Arial;fill:#1f2937}.b{fill:#dcfce7;stroke:#166534;stroke-width:2}.a{stroke:#166534;stroke-width:2;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#166534"/></marker></defs>
  <text x="40" y="50" class="t">Analytics Metrik Hesaplama Haritası</text>

  <rect x="40" y="110" width="300" height="90" class="b"/><text x="80" y="155" class="s">Ledger filter:</text><text x="80" y="178" class="s">cleared + credit/refund</text>
  <rect x="400" y="110" width="300" height="90" class="b"/><text x="450" y="155" class="s">get_revenue_period</text>
  <rect x="760" y="110" width="360" height="90" class="b"/><text x="790" y="155" class="s">get_growth_rate (non-overlap)</text>

  <rect x="220" y="300" width="320" height="90" class="b"/><text x="260" y="350" class="s">get_avg_booking_value</text>
  <rect x="620" y="300" width="360" height="90" class="b"/><text x="660" y="350" class="s">get_sparkline_data (0.0 backfill)</text>

  <rect x="340" y="500" width="520" height="110" class="b"/><text x="380" y="550" class="s">Dashboard KPI: revenue, growth, avg, sparkline</text>

  <line x1="340" y1="155" x2="400" y2="155" class="a"/>
  <line x1="700" y1="155" x2="760" y2="155" class="a"/>
  <line x1="520" y1="200" x2="380" y2="300" class="a"/>
  <line x1="520" y1="200" x2="800" y2="300" class="a"/>
  <line x1="380" y1="390" x2="520" y2="500" class="a"/>
  <line x1="800" y1="390" x2="680" y2="500" class="a"/>
</svg>
