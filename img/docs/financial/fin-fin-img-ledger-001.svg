<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700"><style>.t{font:700 24px Arial;fill:#111827}.s{font:500 15px Arial;fill:#1f2937}.b{fill:#f1f5f9;stroke:#334155;stroke-width:2}.p{fill:#e0f2fe;stroke:#0369a1;stroke-width:2}.n{fill:#fee2e2;stroke:#991b1b;stroke-width:2}</style><text x="40" y="50" class="t">Ledger Type -> Bakiye Etkisi Matrisi</text><rect x="70" y="110" width="1060" height="520" class="b"/><text x="110" y="170" class="s">commission_credit: + amount (gelir artışı)</text><rect x="90" y="185" width="1020" height="70" class="p"/><text x="110" y="228" class="s">commission_refund: - amount (gelir düzeltmesi)</text><rect x="90" y="275" width="1020" height="70" class="n"/><text x="110" y="318" class="s">payout_debit: - amount (çekim)</text><rect x="90" y="365" width="1020" height="70" class="n"/><text x="110" y="408" class="s">payout_reversal: + amount (başarısız payout iadesi)</text><rect x="90" y="455" width="1020" height="70" class="p"/><text x="110" y="498" class="s">Bakiye hesapları: SUM(amount) WHERE status='cleared'</text><text x="110" y="560" class="s">Not: UPDATE/DELETE yok, düzeltme yeni satır ile yapılır.</text></svg>
