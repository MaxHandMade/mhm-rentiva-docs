<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <style>
    .t{font:700 24px Arial;fill:#111827}.s{font:500 15px Arial;fill:#1f2937}.b{fill:#fee2e2;stroke:#991b1b;stroke-width:2}.a{stroke:#991b1b;stroke-width:2;marker-end:url(#m)}
  </style>
  <defs><marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#991b1b"/></marker></defs>
  <text x="40" y="50" class="t">Finansal Tablolar - ER Görünümü</text>

  <rect x="70" y="130" width="460" height="220" class="b"/>
  <text x="95" y="165" class="s">mhm_rentiva_ledger</text>
  <text x="95" y="195" class="s">PK id, UNIQUE transaction_uuid</text>
  <text x="95" y="225" class="s">vendor_id, booking_id, order_id</text>
  <text x="95" y="255" class="s">type, amount, status, created_at</text>
  <text x="95" y="285" class="s">policy_id, policy_version_hash</text>

  <rect x="650" y="130" width="470" height="220" class="b"/>
  <text x="675" y="165" class="s">mhm_rentiva_commission_policy</text>
  <text x="675" y="195" class="s">PK id, UNIQUE version_hash</text>
  <text x="675" y="225" class="s">global_rate, vendor_id</text>
  <text x="675" y="255" class="s">effective_from, effective_to</text>

  <rect x="360" y="430" width="480" height="210" class="b"/>
  <text x="390" y="465" class="s">mhm_rentiva_payout_audit</text>
  <text x="390" y="495" class="s">PK id, payout_id, actor_user_id, action</text>
  <text x="390" y="525" class="s">tx_uuid, ip_hash, metadata_json, created_at</text>
  <text x="390" y="555" class="s">UNIQUE (payout_id, action, tx_uuid)</text>

  <line x1="530" y1="250" x2="650" y2="250" class="a"/>
  <text x="545" y="235" class="s">policy_id -> policy.id</text>
  <line x1="300" y1="350" x2="480" y2="430" class="a"/>
  <text x="245" y="385" class="s">payout işlemleri loglanır</text>
</svg>
