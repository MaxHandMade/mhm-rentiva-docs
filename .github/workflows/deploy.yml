name: Build & Deploy Documentation

on:
  push:
    branches: [ main ]
    paths: [ '**' ]
  pull_request:
    branches: [ main ]
  # Allow manual runs from the Actions web UI
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: Build, link-check, deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

      - name: Verify all internal links resolve
        run: bash scripts/check-links.sh

      - name: Deploy to GitHub Pages (peaceiris)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
